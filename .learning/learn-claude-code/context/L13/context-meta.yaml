## Key Insights
1. 主循环只有一条，并行的是等待，不是主循环本身
2. 任务表管执行状态，通知队列管结果投递
3. 通知只放摘要，全文放文件，模型要看再读
4. task = 工作板（做什么），background task = 运行作业（在跑什么）

