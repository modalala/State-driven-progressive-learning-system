id: TD-03
name: 拒绝展示后续 TODO
dimension: todo_disclosure
priority: P0
description: 验证用户询问后续 TODO 时，Skill 正确拒绝并引导完成当前

setup:
  fixture: full-project
  preconditions:
    - current_lesson: "L0"
    - todos_completed: 0
    - current_todo: "todo-1"

input:
  user_message: "TODO-2 是什么？我想直接看那个"
  context:
    working_dir: "full-project"

expected:
  output_contains:
    - "请先完成"
    - "TODO-1"
    - "最佳学习效果"

  output_not_contains:
    - "循环理解"        # TODO-2 的标题
    - "感知-思考-行动"  # TODO-2 的内容
    - "画图"            # TODO-2 的产出

  behavior:
    reject_skip: true
    guide_current: true

grader:
  type: disclosure_checker
  checks:
    - type: skip_rejected
      requested_todo: "todo-2"
    - type: no_content_leak
      hidden_todos: ["todo-2", "todo-3"]
    - type: output_contains
      values: ["请先完成", "当前"]
